# Clippy configuration for Linky C2 Framework
# Enforce Rust idiomatic coding and security best practices

[lint]
# Security-related lints
unsafe_code = "deny"
unused_unsafe = "deny"

# Correctness lints
clippy::all = "warn"
clippy::pedantic = "warn"
clippy::nursery = "warn"
clippy::cargo = "warn"

# Allow some common patterns that are safe
clippy::module_name_repetitions = "allow"
clippy::similar_names = "allow"
clippy::too_many_lines = "allow"

# Deny critical issues
clippy::unwrap_used = "deny"
clippy::expect_used = "deny"
clippy::panic = "deny"
clippy::todo = "deny"
clippy::unimplemented = "deny"

# Style and idiomatic Rust
clippy::cognitive_complexity = "warn"
clippy::missing_docs_in_private_items = "warn"
clippy::missing_errors_doc = "warn"
clippy::missing_panics_doc = "warn"
clippy::needless_pass_by_value = "warn"
clippy::unnecessary_wraps = "warn"
clippy::inefficient_to_string = "warn"
clippy::large_enum_variant = "warn"
