[package]
name = "linky"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "linky"
path = "src/main.rs"

[dependencies]
actix-web   = { version = "4", features = ["rustls-0_23"] }
rustls      = "0.23"
rcgen       = "0.13"
tokio       = { version = "1", features = ["full"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
chrono      = { version = "0.4", features = ["clock"] }
uuid        = { version = "1", features = ["v4"] }
rustyline   = "14"
base64      = "0.22"
log         = "0.4"
env_logger  = "0.11"
